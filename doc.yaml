# Documentation => https://swagger.io/docs/specification/v3_0/basic-structure/
#
# The OpenAPI version defines the overall structure of an API definition
# title is your API name. description is extended information about your API.
# version is an arbitrary string that specifies the version of your API
openapi: 3.0.4
info:
  title: Go API
  description: A simple API for managing users.
  version: 0.1.0

# The servers section specifies the API server and base URL
# You can define one or several servers, such as production and sandbox.
servers:
  - url: https://{environment}.petitprojet.com/
    description: API server
    variables:
      environment:
        default: api    # Production server
        enum:
          - api         # Production server
          - dev.api     # Development server

# The paths section defines individual endpoints (paths) in your API, 
# and the HTTP methods (operations) supported by these endpoints.
paths:
  /api/users:
    get:
      summary: Returns a list of users.
      responses:
        "200": # Response
          description: OK
          content: # Response body
            application/json: # Media type
              schema: # Must-have
                type: array # Data type
                items:
                  $ref: '#/components/schemas/UserResponse'
    post:
      summary: Creates a new user.
      requestBody:
        description: User object that needs to be added
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /api/users/me :
    get:
      summary: Returns the current user.
      responses:
        "200": # Response
          description: OK
          content: # Response body
            application/json: # Media type
              schema: # Must-have
                $ref: '#/components/schemas/UserResponse'
  /api/users/{userId}:
    get:
      summary: Returns a user.
      responses:
        "200": # Response
          description: OK
          content: # Response body
            application/json: # Media type
              schema: # Must-have
                type: object # Data type
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
    put:
      summary: Updates a user.
      requestBody:
        description: User object that needs to be updated
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      summary: Deletes a user.
      responses:
        "204":
          description: No Content
  /auth/login:
    post:
      summary: Logs in a user.
      requestBody:
        description: Login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /auth/register:
    post:
      summary: Registers a new user.
      requestBody:
        description: User registration data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /auth/refresh:
    post:
      summary: Refreshes an access token.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /auth/logout:
    post:
      summary: Logs out a user.
      responses:
        "204":
          description: No Content

# Relative URLs to OAuth2 authorization and token URLs
components:
  securitySchemes:
      oauth2:
        type: oauth2
        flows:
          authorizationCode:
            authorizationUrl: /oauth/dialog
            tokenUrl: /oauth/token
  schemas:
      UserResponse: # Object definition
        type: object
        properties:
          id:
            type: integer
          name:
            type: string
          email:
            type: string
          role:
            type: string
          created_at:
            type: object
          updated_at:
            type: object
          arrival_info:
            type: boolean
          arrival_day:
            type: string
          arrival_time:
            type: string
          departure_day:
            type: string
          departure_time:
            type: string
      UserCreateRequest:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
          password:
            type: string
          role:
            type: string
      UserUpdateRequest:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
          role:
            type: string
          arrival_info:
            type: boolean
          arrival_day:
            type: string
          arrival_time:
            type: string
          departure_day:
            type: string
          departure_time:
            type: string
      LoginRequest:
        type: object
        properties:
          name:
            type: string
          password:
            type: string
      RegisterRequest:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
          password:
            type: string
      TokenResponse:
        type: object
        properties:
          access_token:
            type: string